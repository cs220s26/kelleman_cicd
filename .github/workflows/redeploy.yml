name: Redeploy on AWS

on:
  workflow_dispatch:  # This has to be triggered manually

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ssh-pipeline
        uses: appleboy/ssh-action@v1
        with:
          host: kellemanaweb.moraviancs.click
          username: ec2-user
          key: ${{ secrets.LABSUSERPEM }}
          script: |
            cd /kelleman_cicd
            ./redeploy.sh
